<html>
    <head>
        <title>Shadow</title>
        <style>
            *{
                text-align: center;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
                
            }
            #text{
                text-shadow: 2px 2px 5px red;
            }
            #box{
                box-shadow: 9px 9px 5px black;
            }

        </style>
    </head>
    <body>
        <h1 id="text">we can use text Shadow to give shadow to text itself</h1>
        <h1 id="box">we can use box Shadow to give shadow to box element</h1>
    </body>
</html>
